<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EvolueFit — App do Personal Trainer</title>
<meta name="description" content="Gerencie seus alunos, agenda e treinos em um só lugar.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;
  --accent:#c8f05a;--accent2:#a8d040;
  --text:#f0f0f0;--muted:#888;--border:#2e2e2e;
  --danger:#ff5c5c;--card:#1e1e1e;--radius:16px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
#app{width:100%;max-width:430px;min-height:100vh;margin:0 auto;display:flex;flex-direction:column;padding-bottom:84px;position:relative}

/* Header */
.header{padding:24px 20px 14px;display:flex;align-items:center;justify-content:space-between}
.header-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-0.5px}
.header-title span{color:var(--accent)}
.header-sub{font-size:13px;color:var(--muted);margin-top:2px}
.avatar{width:40px;height:40px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;color:#0f0f0f;font-size:16px;flex-shrink:0}

/* Nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:10px 8px 22px;gap:4px;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border:none;background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;border-radius:12px;transition:color .2s}
.nav-btn.active{color:var(--accent)}
.nav-btn.active .nav-icon{background:rgba(200,240,90,0.12)}
.nav-icon{width:44px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;transition:background .2s}

/* Screens */
.screen{display:none;flex-direction:column;padding:0 20px;gap:14px;animation:fadeUp .25s ease}
.screen.active{display:flex}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Stats */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 12px}
.stat-num{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--accent)}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}

/* Section title */
.section-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

/* Filters */
.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#0f0f0f;font-weight:500}

/* Client card */
.client-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:15px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:border-color .2s;margin-bottom:8px}
.client-card:hover{border-color:var(--accent)}
.client-avatar{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:17px;flex-shrink:0}
.client-name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px}
.client-meta{font-size:12px;color:var(--muted);margin-top:2px}
.client-badge{background:rgba(200,240,90,0.1);color:var(--accent);font-size:11px;padding:4px 9px;border-radius:6px;font-weight:500;flex-shrink:0}
.client-badge.inactive{background:rgba(255,92,92,0.1);color:var(--danger)}

/* FAB */
.fab{position:fixed;bottom:92px;right:calc(50% - 205px);width:50px;height:50px;border-radius:15px;background:var(--accent);border:none;color:#0f0f0f;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(200,240,90,0.3);transition:transform .2s,box-shadow .2s;z-index:99}
.fab:hover{transform:scale(1.07);box-shadow:0 6px 28px rgba(200,240,90,0.4)}

/* Agenda */
.date-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.date-scroll::-webkit-scrollbar{display:none}
.date-chip{display:flex;flex-direction:column;align-items:center;min-width:46px;padding:9px 6px;border-radius:12px;background:var(--card);border:1px solid var(--border);cursor:pointer;transition:all .2s;flex-shrink:0}
.date-chip.active{background:var(--accent);border-color:var(--accent)}
.date-chip.active .date-num,.date-chip.active .date-day{color:#0f0f0f}
.date-num{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;line-height:1.1}
.date-day{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;margin-top:2px}
.date-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:3px}
.date-chip.active .date-dot{background:#0f0f0f}

/* Session card */
.session-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:15px;display:flex;gap:13px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.session-card:hover{border-color:var(--accent)}
.session-time{display:flex;flex-direction:column;align-items:center;min-width:46px}
.session-hour{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;line-height:1}
.session-min{font-size:11px;color:var(--muted)}
.session-line{width:2px;flex:1;background:var(--border);margin:5px auto;border-radius:2px;min-height:18px}
.session-line.done{background:var(--accent)}
.session-name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px}
.session-type{font-size:12px;color:var(--muted);margin-top:2px}
.session-status{margin-top:7px;display:inline-block;font-size:11px;padding:3px 8px;border-radius:6px}
.status-ok{background:rgba(200,240,90,0.1);color:var(--accent)}
.status-pend{background:rgba(255,180,0,0.1);color:#ffb400}
.status-done{background:rgba(100,100,100,0.15);color:var(--muted)}

/* Workout card */
.workout-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .2s;margin-bottom:8px}
.workout-card:hover{border-color:var(--accent)}
.workout-header{padding:15px;display:flex;align-items:center;gap:12px}
.workout-icon{width:40px;height:40px;border-radius:10px;background:rgba(200,240,90,0.1);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.workout-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
.workout-meta{font-size:12px;color:var(--muted);margin-top:2px}
.workout-expand{color:var(--muted);font-size:20px;transition:transform .25s;line-height:1;margin-left:auto}
.workout-body{display:none;border-top:1px solid var(--border)}
.workout-body.open{display:block}
.exercise-row{display:flex;align-items:center;gap:10px;padding:9px 15px;border-bottom:1px solid var(--border)}
.exercise-row:last-child{border-bottom:none}
.ex-num{width:22px;height:22px;border-radius:7px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0}
.ex-name{flex:1;font-size:13px}
.ex-muscle{font-size:10px;color:var(--muted)}
.ex-sets{font-size:12px;color:var(--accent);font-weight:500;white-space:nowrap}

/* Empty */
.empty{text-align:center;padding:36px 20px;color:var(--muted)}
.empty-icon{font-size:38px;margin-bottom:10px}
.empty-text{font-size:14px;line-height:1.6}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex;animation:fadeUp .2s ease}
.modal{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;max-width:430px;padding:22px 20px 38px;max-height:92vh;overflow-y:auto}
.modal-handle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.modal-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.form-label{font-size:12px;color:var(--muted)}
.form-input{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border .2s;width:100%}
.form-input:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-primary{width:100%;padding:13px;background:var(--accent);border:none;border-radius:12px;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#0f0f0f;cursor:pointer;margin-top:6px;transition:background .2s}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{width:100%;padding:11px;background:none;border:1px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--muted);cursor:pointer;margin-top:8px;transition:all .2s}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

/* Exercise selector */
.ex-selector{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
.ex-search-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border)}
.ex-search-row input{background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;flex:1}
.ex-search-row input::placeholder{color:var(--muted)}
.muscle-scroll{display:flex;gap:6px;padding:9px 10px;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none}
.muscle-scroll::-webkit-scrollbar{display:none}
.muscle-chip{padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;font-family:'DM Sans',sans-serif}
.muscle-chip.active{background:rgba(200,240,90,0.15);border-color:var(--accent);color:var(--accent)}
.ex-list{max-height:200px;overflow-y:auto}
.ex-list-item{display:flex;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.ex-list-item:last-child{border-bottom:none}
.ex-list-item:hover{background:rgba(200,240,90,0.05)}
.ex-list-item.selected{background:rgba(200,240,90,0.08)}
.ex-list-name{font-size:13px}
.ex-list-muscle{font-size:11px;color:var(--muted)}
.ex-check{width:20px;height:20px;border-radius:6px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .15s}
.ex-list-item.selected .ex-check{background:var(--accent);border-color:var(--accent);color:#0f0f0f}

/* Selected exercises */
.selected-ex-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.selected-ex-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.selected-ex-name{font-size:13px;font-weight:500}
.selected-ex-muscle{font-size:11px;color:var(--muted);margin-top:1px}
.selected-ex-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:2px 5px;transition:color .2s}
.selected-ex-remove:hover{color:var(--danger)}
.selected-ex-inputs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.mini-input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;width:100%;text-align:center;transition:border .2s}
.mini-input:focus{border-color:var(--accent)}
.mini-label{font-size:10px;color:var(--muted);text-align:center;margin-top:2px}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="header-title">Evolue<span>Fit</span></div>
      <div class="header-sub" id="header-sub">Bem-vindo, Personal! 👋</div>
    </div>
    <div class="avatar">EF</div>
  </div>

  <!-- ALUNOS -->
  <div class="screen active" id="screen-clientes">
    <div class="stats">
      <div class="stat-card"><div class="stat-num" id="total-clientes">0</div><div class="stat-label">Alunos</div></div>
      <div class="stat-card"><div class="stat-num" id="ativos-clientes">0</div><div class="stat-label">Ativos</div></div>
      <div class="stat-card"><div class="stat-num" id="hoje-sessoes">0</div><div class="stat-label">Hoje</div></div>
    </div>
    <div class="filters">
      <button class="filter-chip active" onclick="filterClientes('todos',this)">Todos</button>
      <button class="filter-chip" onclick="filterClientes('ativo',this)">Ativos</button>
      <button class="filter-chip" onclick="filterClientes('inativo',this)">Inativos</button>
    </div>
    <div class="section-title">Seus alunos</div>
    <div id="lista-clientes"></div>
  </div>

  <!-- AGENDA -->
  <div class="screen" id="screen-agenda">
    <div class="date-scroll" id="date-scroll"></div>
    <div class="section-title">Sessões do dia</div>
    <div id="lista-sessoes"></div>
  </div>

  <!-- TREINOS -->
  <div class="screen" id="screen-treinos">
    <div class="filters" id="treino-filters">
      <button class="filter-chip active" onclick="filterTreinos('todos',this)">Todos</button>
      <button class="filter-chip" onclick="filterTreinos('Hipertrofia',this)">Hipertrofia</button>
      <button class="filter-chip" onclick="filterTreinos('Emagrecimento',this)">Emagrecimento</button>
      <button class="filter-chip" onclick="filterTreinos('Funcional',this)">Funcional</button>
      <button class="filter-chip" onclick="filterTreinos('Reabilitação',this)">Reabilitação</button>
    </div>
    <div class="section-title">Fichas de treino</div>
    <div id="lista-treinos"></div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" onclick="goTo('clientes',this)"><div class="nav-icon">👤</div>Alunos</button>
    <button class="nav-btn" onclick="goTo('agenda',this)"><div class="nav-icon">📅</div>Agenda</button>
    <button class="nav-btn" onclick="goTo('treinos',this)"><div class="nav-icon">💪</div>Treinos</button>
  </nav>
  <button class="fab" onclick="openModal()">+</button>
</div>

<!-- Modal Aluno -->
<div class="modal-overlay" id="modal-cliente">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Novo Aluno</div>
    <div class="form-group"><label class="form-label">Nome completo</label><input class="form-input" id="f-nome" placeholder="Ex: João Silva"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Idade</label><input class="form-input" id="f-idade" type="number" placeholder="25"></div>
      <div class="form-group"><label class="form-label">Objetivo</label>
        <select class="form-input" id="f-objetivo"><option>Hipertrofia</option><option>Emagrecimento</option><option>Condicionamento</option><option>Funcional</option><option>Reabilitação</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Peso (kg)</label><input class="form-input" id="f-peso" type="number" placeholder="75"></div>
      <div class="form-group"><label class="form-label">Altura (cm)</label><input class="form-input" id="f-altura" type="number" placeholder="175"></div>
    </div>
    <div class="form-group"><label class="form-label">Telefone</label><input class="form-input" id="f-tel" placeholder="(11) 99999-9999"></div>
    <button class="btn-primary" onclick="salvarCliente()">Salvar aluno</button>
    <button class="btn-ghost" onclick="closeModal('modal-cliente')">Cancelar</button>
  </div>
</div>

<!-- Modal Sessão -->
<div class="modal-overlay" id="modal-sessao">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nova Sessão</div>
    <div class="form-group"><label class="form-label">Aluno</label><select class="form-input" id="s-aluno"></select></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Data</label><input class="form-input" id="s-data" type="date"></div>
      <div class="form-group"><label class="form-label">Horário</label><input class="form-input" id="s-hora" type="time"></div>
    </div>
    <div class="form-group"><label class="form-label">Tipo</label>
      <select class="form-input" id="s-tipo"><option>Musculação</option><option>Funcional</option><option>Cardio</option><option>Avaliação</option><option>Reabilitação</option></select>
    </div>
    <button class="btn-primary" onclick="salvarSessao()">Salvar sessão</button>
    <button class="btn-ghost" onclick="closeModal('modal-sessao')">Cancelar</button>
  </div>
</div>

<!-- Modal Treino -->
<div class="modal-overlay" id="modal-treino">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nova Ficha de Treino</div>
    <div class="form-group"><label class="form-label">Nome da ficha</label><input class="form-input" id="t-nome" placeholder="Ex: Treino A – Peito e Tríceps"></div>
    <div class="form-group"><label class="form-label">Aluno</label><select class="form-input" id="t-aluno"></select></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Categoria</label>
        <select class="form-input" id="t-cat"><option>Hipertrofia</option><option>Emagrecimento</option><option>Funcional</option><option>Reabilitação</option></select>
      </div>
      <div class="form-group"><label class="form-label">Nível</label>
        <select class="form-input" id="t-nivel"><option>Iniciante</option><option>Intermediário</option><option>Avançado</option></select>
      </div>
    </div>
    <div class="section-title" style="margin-bottom:8px">Adicionar exercícios</div>
    <div class="ex-selector">
      <div class="ex-search-row"><span>🔍</span><input id="ex-busca" placeholder="Buscar exercício..." oninput="renderExList()"></div>
      <div class="muscle-scroll" id="muscle-scroll"></div>
      <div class="ex-list" id="ex-list"></div>
    </div>
    <div class="section-title" style="margin-bottom:8px">Selecionados <span id="ex-count" style="color:var(--accent)"></span></div>
    <div id="selected-ex-list"><div style="font-size:13px;color:var(--muted)">Selecione exercícios acima.</div></div>
    <button class="btn-primary" onclick="salvarTreino()">Salvar ficha</button>
    <button class="btn-ghost" onclick="closeModal('modal-treino')">Cancelar</button>
  </div>
</div>

<script>
const COLORS=['#c8f05a','#5ac8f0','#f05ac8','#f0c85a','#5af0c8','#c85af0'];
const EMOJIS=['🏋️','🤸','🏃','⚡','🔥','💎','🎯','🦾'];
const MUSCULOS=['Todos','Peito','Costas','Ombros','Bíceps','Tríceps','Quadríceps','Posterior','Glúteos','Panturrilha','Abdômen','Funcional','Mobilidade'];

const EXERCICIOS_DB=[
  {id:1,nome:'Supino reto',musculo:'Peito',eq:'Barra'},{id:2,nome:'Supino inclinado',musculo:'Peito',eq:'Barra'},{id:3,nome:'Supino declinado',musculo:'Peito',eq:'Barra'},
  {id:4,nome:'Supino reto halteres',musculo:'Peito',eq:'Halteres'},{id:5,nome:'Supino inclinado halteres',musculo:'Peito',eq:'Halteres'},{id:6,nome:'Crucifixo plano',musculo:'Peito',eq:'Halteres'},
  {id:7,nome:'Crucifixo inclinado',musculo:'Peito',eq:'Halteres'},{id:8,nome:'Crossover alto',musculo:'Peito',eq:'Cabo'},{id:9,nome:'Crossover baixo',musculo:'Peito',eq:'Cabo'},
  {id:10,nome:'Flexão de braço',musculo:'Peito',eq:'Peso corporal'},{id:11,nome:'Peck deck',musculo:'Peito',eq:'Máquina'},
  {id:12,nome:'Barra fixa',musculo:'Costas',eq:'Peso corporal'},{id:13,nome:'Remada curvada',musculo:'Costas',eq:'Barra'},{id:14,nome:'Remada unilateral',musculo:'Costas',eq:'Halteres'},
  {id:15,nome:'Remada cavalinho',musculo:'Costas',eq:'Máquina'},{id:16,nome:'Puxada frente',musculo:'Costas',eq:'Cabo'},{id:17,nome:'Puxada atrás',musculo:'Costas',eq:'Cabo'},
  {id:18,nome:'Remada baixa cabo',musculo:'Costas',eq:'Cabo'},{id:19,nome:'Pullover',musculo:'Costas',eq:'Halteres'},{id:20,nome:'Levantamento terra',musculo:'Costas',eq:'Barra'},

function loadState(){
  try{return JSON.parse(localStorage.getItem('evoluefit'))||defaultState()}catch(e){return defaultState()}
}
function defaultState(){
  return{
    clientes:[
      {id:1,nome:'Ana Paula',idade:28,objetivo:'Emagrecimento',peso:68,altura:165,tel:'(11) 98765-4321',status:'ativo',cor:0},
      {id:2,nome:'Carlos Eduardo',idade:35,objetivo:'Hipertrofia',peso:85,altura:178,tel:'(11) 91234-5678',status:'ativo',cor:1},
      {id:3,nome:'Fernanda Lima',idade:24,objetivo:'Condicionamento',peso:58,altura:162,tel:'(11) 99876-5432',status:'ativo',cor:2},
    ],
    sessoes:[
      {id:1,clienteId:1,data:today(),hora:'07:00',tipo:'Funcional',status:'confirmado'},
      {id:2,clienteId:2,data:today(),hora:'08:30',tipo:'Musculação',status:'confirmado'},
      {id:3,clienteId:3,data:today(),hora:'10:00',tipo:'Cardio',status:'pendente'},
    ],
    treinos:[
      {id:1,nome:'Treino A – Peito e Tríceps',clienteId:2,categoria:'Hipertrofia',nivel:'Intermediário',exercicios:[
        {exId:1,series:'4',reps:'10',carga:'60kg'},{exId:6,series:'3',reps:'12',carga:'16kg'},
        {exId:36,series:'4',reps:'15',carga:'25kg'},{exId:38,series:'3',reps:'12',carga:'20kg'},
      ]},
      {id:2,nome:'Full Body Iniciante',clienteId:3,categoria:'Emagrecimento',nivel:'Iniciante',exercicios:[
        {exId:43,series:'4',reps:'15',carga:'20kg'},{exId:10,series:'3',reps:'12',carga:'—'},
        {exId:13,series:'3',reps:'12',carga:'30kg'},{exId:64,series:'3',reps:'20',carga:'—'},
      ]},
    ],
    selectedDate:today(),
    filterCliente:'todos',
    filterTreino:'todos',
    muscFiltro:'Todos',
    selectedExs:{},
    currentScreen:'clientes',
  };
}
function saveState(){try{localStorage.setItem('evoluefit',JSON.stringify(state))}catch(e){}}

let state=loadState();

function today(){const d=new Date();return d.toISOString().split('T')[0]}
function initials(n){return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}
function exById(id){return EXERCICIOS_DB.find(e=>e.id===id)||{nome:'?',musculo:'?'}}

function goTo(screen,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+screen).classList.add('active');
  btn.classList.add('active');
  state.currentScreen=screen;
  render();
}

function openModal(){
  const m={clientes:'modal-cliente',agenda:'modal-sessao',treinos:'modal-treino'}[state.currentScreen];
  if(m==='modal-sessao'||m==='modal-treino') populateSelects();
  if(m==='modal-treino'){
    state.selectedExs={};
    document.getElementById('ex-busca').value='';
    state.muscFiltro='Todos';
    renderMuscleChips();renderExList();renderSelectedExs();
  }
  if(m==='modal-sessao'){document.getElementById('s-data').value=today();document.getElementById('s-hora').value='07:00';}
  document.getElementById(m).classList.add('open');
}
function closeModal(id){document.getElementById(id).classList.remove('open')}

function populateSelects(){
  const opts=state.clientes.filter(c=>c.status==='ativo').map(c=>`<option value="${c.id}">${c.nome}</option>`).join('');
  ['s-aluno','t-aluno'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=opts||'<option value="">Cadastre um aluno primeiro</option>'});
}

function renderMuscleChips(){
  document.getElementById('muscle-scroll').innerHTML=MUSCULOS.map(m=>
    `<button class="muscle-chip ${m===state.muscFiltro?'active':''}" onclick="setMusc('${m}')">${m}</button>`
  ).join('');
}
function setMusc(m){state.muscFiltro=m;renderMuscleChips();renderExList()}

function renderExList(){
  const busca=(document.getElementById('ex-busca')||{value:''}).value.toLowerCase();
  let lista=EXERCICIOS_DB;
  if(state.muscFiltro!=='Todos') lista=lista.filter(e=>e.musculo===state.muscFiltro);
  if(busca) lista=lista.filter(e=>e.nome.toLowerCase().includes(busca)||e.musculo.toLowerCase().includes(busca));
  const el=document.getElementById('ex-list');
  if(!lista.length){el.innerHTML=`<div style="padding:14px;text-align:center;font-size:13px;color:var(--muted)">Nenhum exercício encontrado</div>`;return}
  el.innerHTML=lista.map(e=>{
    const sel=!!state.selectedExs[e.id];
    return`<div class="ex-list-item ${sel?'selected':''}" onclick="toggleEx(${e.id})">
      <div style="flex:1"><div class="ex-list-name">${e.nome}</div><div class="ex-list-muscle">${e.musculo} · ${e.eq}</div></div>
      <div class="ex-check">${sel?'✓':''}</div>
    </div>`;
  }).join('');
}

function toggleEx(id){
  if(state.selectedExs[id]){delete state.selectedExs[id]}
  else{state.selectedExs[id]={series:'3',reps:'12',carga:''}}
  renderExList();renderSelectedExs();
}

function renderSelectedExs(){
  const ids=Object.keys(state.selectedExs);
  document.getElementById('ex-count').textContent=ids.length?`(${ids.length})`:'';
  const el=document.getElementById('selected-ex-list');
  if(!ids.length){el.innerHTML=`<div style="font-size:13px;color:var(--muted)">Selecione exercícios acima.</div>`;return}
  el.innerHTML=ids.map(id=>{
    const ex=exById(+id);const d=state.selectedExs[id];
    return`<div class="selected-ex-card">
      <div class="selected-ex-top">
        <div><div class="selected-ex-name">${ex.nome}</div><div class="selected-ex-muscle">${ex.musculo}</div></div>
        <button class="selected-ex-remove" onclick="toggleEx(${id})">✕</button>
      </div>
      <div class="selected-ex-inputs">
        <div><input class="mini-input" value="${d.series}" oninput="updateEx(${id},'series',this.value)" placeholder="3"><div class="mini-label">Séries</div></div>
        <div><input class="mini-input" value="${d.reps}" oninput="updateEx(${id},'reps',this.value)" placeholder="12"><div class="mini-label">Reps</div></div>
        <div><input class="mini-input" value="${d.carga}" oninput="updateEx(${id},'carga',this.value)" placeholder="kg"><div class="mini-label">Carga</div></div>
      </div>
    </div>`;
  }).join('');
}
function updateEx(id,field,val){if(state.selectedExs[id])state.selectedExs[id][field]=val}

function salvarCliente(){
  const nome=document.getElementById('f-nome').value.trim();
  if(!nome)return;
  state.clientes.push({id:Date.now(),nome,idade:+document.getElementById('f-idade').value||0,objetivo:document.getElementById('f-objetivo').value,peso:+document.getElementById('f-peso').value||0,altura:+document.getElementById('f-altura').value||0,tel:document.getElementById('f-tel').value,status:'ativo',cor:state.clientes.length%COLORS.length});
  ['f-nome','f-idade','f-peso','f-altura','f-tel'].forEach(id=>document.getElementById(id).value='');
  saveState();closeModal('modal-cliente');render();
}

function salvarSessao(){
  const clienteId=+document.getElementById('s-aluno').value;
  const data=document.getElementById('s-data').value;
  const hora=document.getElementById('s-hora').value;
  if(!clienteId||!data||!hora)return;
  state.sessoes.push({id:Date.now(),clienteId,data,hora,tipo:document.getElementById('s-tipo').value,status:'pendente'});
  state.selectedDate=data;
  saveState();closeModal('modal-sessao');render();
}

function salvarTreino(){
  const nome=document.getElementById('t-nome').value.trim();
  const ids=Object.keys(state.selectedExs);
  if(!nome||!ids.length)return;
  state.treinos.push({id:Date.now(),nome,clienteId:+document.getElementById('t-aluno').value,categoria:document.getElementById('t-cat').value,nivel:document.getElementById('t-nivel').value,exercicios:ids.map(id=>({exId:+id,...state.selectedExs[id]}))});
  saveState();closeModal('modal-treino');render();
}

function filterClientes(f,btn){state.filterCliente=f;document.querySelectorAll('#screen-clientes .filter-chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderClientes()}
function filterTreinos(f,btn){state.filterTreino=f;document.querySelectorAll('#treino-filters .filter-chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTreinos()}

function renderClientes(){
  let clientes=state.clientes;
  if(state.filterCliente!=='todos') clientes=clientes.filter(c=>c.status===state.filterCliente);
  document.getElementById('total-clientes').textContent=state.clientes.length;
  document.getElementById('ativos-clientes').textContent=state.clientes.filter(c=>c.status==='ativo').length;
  document.getElementById('hoje-sessoes').textContent=state.sessoes.filter(s=>s.data===today()).length;
  const list=document.getElementById('lista-clientes');
  if(!clientes.length){list.innerHTML=`<div class="empty"><div class="empty-icon">👤</div><div class="empty-text">Nenhum aluno ainda.<br>Toque em + para adicionar.</div></div>`;return}
  list.innerHTML=clientes.map(c=>`
    <div class="client-card">
      <div class="client-avatar" style="background:${COLORS[c.cor]}22;color:${COLORS[c.cor]}">${initials(c.nome)}</div>
      <div style="flex:1;min-width:0"><div class="client-name">${c.nome}</div><div class="client-meta">${c.objetivo} · ${c.idade} anos · ${c.peso}kg</div></div>
      <div class="client-badge ${c.status==='inativo'?'inactive':''}">${c.status==='ativo'?'Ativo':'Inativo'}</div>
    </div>`).join('');
}

function renderAgenda(){
  const days=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const dates=[];
  for(let i=-1;i<=7;i++){const d=new Date();d.setDate(d.getDate()+i);dates.push(d)}
  document.getElementById('date-scroll').innerHTML=dates.map(d=>{
    const str=d.toISOString().split('T')[0];
    const has=state.sessoes.some(s=>s.data===str);
    return`<div class="date-chip ${str===state.selectedDate?'active':''}" onclick="selectDate('${str}',this)">
      <div class="date-num">${d.getDate()}</div>
      <div class="date-day">${days[d.getDay()]}</div>
      ${has?'<div class="date-dot"></div>':''}
    </div>`;
  }).join('');
  renderSessoes();
}

function selectDate(date,el){
  state.selectedDate=date;
  document.querySelectorAll('.date-chip').forEach(d=>d.classList.remove('active'));
  el.classList.add('active');renderSessoes();
}

function renderSessoes(){
  const sessoes=state.sessoes.filter(s=>s.data===state.selectedDate).sort((a,b)=>a.hora.localeCompare(b.hora));
  const list=document.getElementById('lista-sessoes');
  if(!sessoes.length){list.innerHTML=`<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">Nenhuma sessão neste dia.</div></div>`;return}
  list.innerHTML=sessoes.map(s=>{
    const c=state.clientes.find(x=>x.id===s.clienteId)||{nome:'?'};
    const [h,m]=s.hora.split(':');
    const lbl={confirmado:'Confirmado',pendente:'Pendente',realizado:'Realizado'}[s.status];
    const cls={confirmado:'status-ok',pendente:'status-pend',realizado:'status-done'}[s.status];
    return`<div class="session-card">
      <div class="session-time"><div class="session-hour">${h}</div><div class="session-min">${m}h</div><div class="session-line ${s.status==='realizado'?'done':''}"></div></div>
      <div style="flex:1"><div class="session-name">${c.nome}</div><div class="session-type">${s.tipo}</div><div class="session-status ${cls}">${lbl}</div></div>
    </div>`;
  }).join('');
}

function renderTreinos(){
  let treinos=state.treinos;
  if(state.filterTreino!=='todos') treinos=treinos.filter(t=>t.categoria===state.filterTreino);
  const list=document.getElementById('lista-treinos');
  if(!treinos.length){list.innerHTML=`<div class="empty"><div class="empty-icon">💪</div><div class="empty-text">Nenhuma ficha ainda.<br>Toque em + para criar.</div></div>`;return}
  list.innerHTML=treinos.map((t,i)=>{
    const c=state.clientes.find(x=>x.id===t.clienteId)||{nome:'Sem aluno'};
    return`<div class="workout-card">
      <div class="workout-header" onclick="toggleWorkout(${t.id})">
        <div class="workout-icon">${EMOJIS[i%EMOJIS.length]}</div>
        <div style="flex:1"><div class="workout-name">${t.nome}</div><div class="workout-meta">${c.nome} · ${t.categoria} · ${t.nivel}</div></div>
        <div class="workout-expand" id="exp-${t.id}">›</div>
      </div>
      <div class="workout-body" id="body-${t.id}">
        ${t.exercicios.map((e,j)=>{const ex=exById(e.exId);return`<div class="exercise-row"><div class="ex-num">${j+1}</div><div style="flex:1"><div class="ex-name">${ex.nome}</div><div class="ex-muscle">${ex.musculo}</div></div><div class="ex-sets">${e.series}×${e.reps}${e.carga&&e.carga!=='—'?' · '+e.carga:''}</div></div>`}).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleWorkout(id){
  const body=document.getElementById('body-'+id);
  const exp=document.getElementById('exp-'+id);
  const open=body.classList.toggle('open');
  exp.style.transform=open?'rotate(90deg)':'rotate(0)';
}

function render(){renderClientes();renderAgenda();renderTreinos()}
render();
</script>
</body>
</html>
